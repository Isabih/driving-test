services:
  db:
    image: postgres:16
    container_name: apaforme-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: apaforme
      POSTGRES_USER: apaforme
      POSTGRES_PASSWORD: apaforme123
    volumes:
      - ../../data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: apaforme-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ../mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ../../data/mosquitto:/mosquitto/data
      - ../../data/mosquitto-log:/mosquitto/log

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: apaforme-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "8889:8889"
      - "8189:8189/udp"
      - "8890:8890"
    volumes:
      - ../mediamtx/mediamtx.yml:/mediamtx.yml:ro

  backend:
    image: python:3.11-slim
    container_name: apaforme-backend
    working_dir: /app
    restart: unless-stopped
    command: bash -lc "pip install -r requirements.txt && python run.py"
    volumes:
      - ../../:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://apaforme:apaforme123@db:5432/apaforme
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      PUBLIC_BASE_URL: http://localhost:8000
    depends_on:
      - db
      - mosquitto
    ports:
      - "8000:8000"

  vision_service:
    image: python:3.11-slim
    container_name: apaforme-vision
    working_dir: /app/vision_service
    restart: unless-stopped
    command: bash -lc "pip install -r requirements.txt && python main.py"
    volumes:
      - ../../:/app
    environment:
      API_BASE_URL: http://backend:8000
      API_TOKEN: CHANGE_ME_AFTER_LOGIN
      STAGE_CAMERA_CONFIG: /app/config/stage_cameras.json
    depends_on:
      - backend
      - mediamtx
